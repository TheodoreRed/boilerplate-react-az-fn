name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - staging
      - main
    paths:
      - "frontend/**"

permissions:
  contents: read

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    name: Build and Deploy (${{ github.ref_name }})

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: frontend
        env:
          VITE_GLOBAL_WEBAPP_CLIENT_ID: ${{ vars.VITE_GLOBAL_WEBAPP_CLIENT_ID }}
          VITE_CIAM_DOMAIN: ${{ vars.VITE_CIAM_DOMAIN }}
          VITE_API_SCOPE: ${{ vars.VITE_API_SCOPE }}
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}
        run: pnpm run build

      - name: Copy static web app config
        run: cp frontend/staticwebapp.config.json frontend/dist/

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          api_location: ""
          output_location: ""
          skip_app_build: true
