name: Deploy Node.js project to Azure Function App

on:
  pull_request:
    types: [closed]
    branches:
      - development
      - staging
      - main

permissions:
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: 'my-function-app-name' # Set this to your Azure Function App name
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  NODE_VERSION: '22.x'

jobs:
  build-and-deploy:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    environment: ${{ github.base_ref }} # GitHub environment must match the branch name

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 'Install / Build'
        shell: pwsh
        run: |
          npm install
          npm run build

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: .
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          sku: flexconsumption
          remote-build: false
